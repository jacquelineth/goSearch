name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
          cache: true

      - name: Install Linux build dependencies (X11/OpenGL)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxcursor-dev libxrandr-dev \
            libxi-dev libxinerama-dev mesa-common-dev libgl1-mesa-dev xorg-dev

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go modules
        run: go mod download



      - name: Build (Linux)
        run: go build -o bin/search-linux ./cmd/search

      - name: Test
        run: go test -v ./...

  build-matrix:
    name: Build multi-platform binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
          cache: true

      - name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          go build -o bin/search-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/search
